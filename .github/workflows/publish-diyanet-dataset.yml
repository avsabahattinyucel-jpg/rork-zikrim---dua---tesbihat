name: Publish Diyanet Dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-diyanet-dataset
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: diyk-dataset/pnpm-lock.yaml

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.6.0 --activate
          pnpm --version

      - name: Install dependencies
        working-directory: diyk-dataset
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: diyk-dataset
        run: pnpm exec playwright install --with-deps chromium

      - name: Crawl
        working-directory: diyk-dataset
        env:
          OUTPUT_DIR: data-ci
          USE_PLAYWRIGHT: "true"
          RESPECT_ROBOTS: "true"
          MAX_CONCURRENCY: "2"
          REQUEST_DELAY_MS: "1500"
          FETCH_TIMEOUT_MS: "45000"
        run: pnpm crawl

      - name: Parse
        working-directory: diyk-dataset
        env:
          OUTPUT_DIR: data-ci
        run: pnpm parse

      - name: Export
        working-directory: diyk-dataset
        env:
          OUTPUT_DIR: data-ci
        run: pnpm export

      - name: Publish remote bundle
        env:
          DIYK_OUTPUT_DIR: data-ci
          DIYK_PUBLISH_DIR: diyk-dataset/published/diyanet
          DIYK_PUBLISH_BASE_URL: https://avsabahattinyucel-jpg.github.io/rork-zikrim---dua---tesbihat/diyanet
        run: node scripts/publish_diyanet_remote_bundle.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: diyk-dataset/published

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
