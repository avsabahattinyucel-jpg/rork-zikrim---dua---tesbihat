  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --panel: rgba(255, 255, 255, 0.9);
      --text: #17202a;
      --muted: #5b6777;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --accent-soft: rgba(15, 118, 110, 0.1);
      --border: rgba(15, 23, 42, 0.1);
      --warm: #c07c37;
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(192, 124, 55, 0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.14), transparent 30%),
        linear-gradient(180deg, #f7f3ec 0%, var(--bg) 100%);
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 88px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 28px;
      overflow: hidden;
      position: relative;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: auto -40px -60px auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.16), transparent 64%);
      pointer-events: none;
    }
    .hero-top {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-size: 13px;
    }
    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: white;
      font-size: 18px;
      box-shadow: 0 12px 28px rgba(15, 118, 110, 0.24);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }
    select {
      margin-left: 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }
    .hero-grid {
      display: grid;
      gap: 18px;
    }
    h1, h2, h3 {
      margin: 0;
      line-height: 1.15;
    }
    .headline {
      display: grid;
      gap: 16px;
    }
    .headline p,
    p,
    li {
      color: var(--muted);
      line-height: 1.72;
      margin: 0;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
    }
    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .button-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
    }
    .button-secondary {
      background: rgba(255, 255, 255, 0.7);
      color: var(--text);
      border-color: var(--border);
    }
    .summary {
      display: grid;
      gap: 14px;
    }
    .metric {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.68);
    }
    .metric strong {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
      color: var(--text);
    }
    .section {
      margin-top: 18px;
      padding: 24px;
    }
    .section-header {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .feature-card,
    .detail-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.62);
    }
    ul {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 10px;
    }
    .notice {
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(192, 124, 55, 0.2);
      background: rgba(192, 124, 55, 0.08);
      color: #7a511e;
    }
    footer {
      margin-top: 22px;
      padding: 22px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      display: grid;
      gap: 10px;
    }
    footer a { color: var(--accent); }
    a { color: var(--accent); }
    @media (min-width: 820px) {
      .hero-grid {
        grid-template-columns: 1.5fr 1fr;
        align-items: start;
      }
      .grid.two {
        grid-template-columns: 1fr 1fr;
      }
      .grid.three {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

    const languageOrder = ["tr", "en", "de", "es", "fr", "id", "ms", "ar", "ur"];

    function setText(id, value) {
      const node = document.getElementById(id);
      if (node) node.textContent = value;
    }

    function renderList(id, items) {
      const node = document.getElementById(id);
      if (!node) return;
      node.innerHTML = "";
      items.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        node.appendChild(li);
      });
    }

    function renderPairGrid(id, items, className) {
      const node = document.getElementById(id);
      if (!node) return;
      node.innerHTML = "";
      items.forEach(([title, body]) => {
        const card = document.createElement("div");
        card.className = className;
        const h3 = document.createElement("h3");
        h3.textContent = title;
        const p = document.createElement("p");
        p.style.marginTop = "10px";
        p.textContent = body;
        card.appendChild(h3);
        card.appendChild(p);
        node.appendChild(card);
      });
    }

    function populateSelector() {
      const select = document.getElementById("languageSelect");
      languageOrder.forEach((code) => {
        const data = translations[code] || localizedSets[code];
        const option = document.createElement("option");
        option.value = code;
        option.textContent = data.label;
        select.appendChild(option);
      });
      return select;
    }

    function resolveLanguage() {
      const params = new URLSearchParams(window.location.search);
      const explicit = params.get("lang");
      if (explicit && languageOrder.includes(explicit)) return explicit;
      const browser = (navigator.language || "en").slice(0, 2).toLowerCase();
      if (languageOrder.includes(browser)) return browser;
      return "en";
    }

    function applyLanguage(code) {
      const data = translations[code] || localizedSets[code] || translations.en;
      document.documentElement.lang = code;
      setText("languageLabel", data.languageLabel);
      setText("heroPill1", data.heroPill1);
      setText("heroPill2", data.heroPill2);
      setText("heroPill3", data.heroPill3);
      setText("title", data.title);
      setText("intro", data.intro);
      setText("ctaPrimary", data.ctaPrimary);
      setText("ctaSecondary", data.ctaSecondary);
      setText("heroNotice", data.heroNotice);
      setText("metric1Title", data.metric1Title);
      setText("metric1Body", data.metric1Body);
      setText("metric2Title", data.metric2Title);
      setText("metric2Body", data.metric2Body);
      setText("metric3Title", data.metric3Title);
      setText("metric3Body", data.metric3Body);
      setText("featuresTitle", data.featuresTitle);
      setText("featuresIntro", data.featuresIntro);
      setText("detailsTitle", data.detailsTitle);
      setText("detailsIntro", data.detailsIntro);
      setText("audienceTitle", data.audienceTitle);
      setText("audienceIntro", data.audienceIntro);
      setText("audienceCard1Title", data.audienceCard1Title);
      setText("audienceCard2Title", data.audienceCard2Title);
      setText("trustTitle", data.trustTitle);
      setText("trustIntro", data.trustIntro);
      setText("trustCard1Title", data.trustCard1Title);
      setText("trustCard2Title", data.trustCard2Title);
      setText("footerTitle", data.footerTitle);
      setText("footerBody", data.footerBody);
      setText("footerPrivacy", data.footerPrivacy);
      setText("footerTerms", data.footerTerms);
      renderPairGrid("featuresGrid", data.features, "feature-card");
      renderPairGrid("detailsGrid", data.details, "detail-card");
      renderList("audienceCard1List", data.audienceCard1List);
      renderList("audienceCard2List", data.audienceCard2List);
      renderList("trustCard1List", data.trustCard1List);
      renderList("trustCard2List", data.trustCard2List);
      document.getElementById("languageSelect").value = code;
      const url = new URL(window.location.href);
      url.searchParams.set("lang", code);
      window.history.replaceState({}, "", url);
    }

    const select = populateSelector();
    applyLanguage(resolveLanguage());
    select.addEventListener("change", (event) => {
      applyLanguage(event.target.value);
    });
