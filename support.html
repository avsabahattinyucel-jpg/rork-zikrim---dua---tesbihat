  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --panel: rgba(255, 255, 255, 0.9);
      --text: #17202a;
      --muted: #5b6777;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --accent-soft: rgba(15, 118, 110, 0.1);
      --border: rgba(15, 23, 42, 0.1);
      --warm: #c07c37;
      --warm-soft: rgba(192, 124, 55, 0.08);
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(192, 124, 55, 0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.14), transparent 30%),
        linear-gradient(180deg, #f7f3ec 0%, var(--bg) 100%);
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 88px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }
    .hero, .section, footer {
      padding: 26px;
    }
    .hero {
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: auto -40px -60px auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.16), transparent 64%);
      pointer-events: none;
    }
    .hero-top {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-size: 13px;
    }
    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      font-size: 18px;
      box-shadow: 0 12px 28px rgba(15, 118, 110, 0.24);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }
    select {
      margin-left: 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }
    h1, h2, h3 {
      margin: 0;
      line-height: 1.15;
    }
    p, li {
      color: var(--muted);
      line-height: 1.72;
      margin: 0;
    }
    .hero-grid, .grid {
      display: grid;
      gap: 18px;
    }
    .headline {
      display: grid;
      gap: 16px;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
    }
    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .button-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
    }
    .button-secondary {
      background: rgba(255, 255, 255, 0.7);
      color: var(--text);
      border-color: var(--border);
    }
    .summary, .detail-group {
      display: grid;
      gap: 14px;
    }
    .metric, .detail-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.68);
    }
    .metric strong {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
      color: var(--text);
    }
    .section {
      margin-top: 18px;
    }
    .section-header {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }
    ul {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 10px;
    }
    .notice {
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(192, 124, 55, 0.2);
      background: var(--warm-soft);
      color: #7a511e;
    }
    footer {
      margin-top: 18px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.7);
      display: grid;
      gap: 10px;
      border-radius: 24px;
    }
    a { color: var(--accent); }
    @media (min-width: 820px) {
      .hero-grid {
        grid-template-columns: 1.35fr 1fr;
        align-items: start;
      }
      .grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

          "crash یا freeze رپورٹ کرتے وقت ڈیوائس ماڈل اور ورژن اہم ہوتے ہیں۔",
          "نوٹیفکیشن یا آڈیو مسائل میں ایپ permissions اور ڈیوائس ساؤنڈ سیٹنگز چیک کریں۔",
          "نقشہ، قبلہ، یا نماز اوقات کے مسائل میں location permission اور خطے کی تفصیل مدد دیتی ہے۔"
        ],
        requestGuideTitle: "سپورٹ درخواست بھیجتے وقت",
        requestGuideIntro: "نیچے دی گئی معلومات شامل کرنے سے عموماً زیادہ تیز اور درست جائزہ ممکن ہوتا ہے۔",
        requestCardTitle: "شامل کرنے کے لیے مفید معلومات",
        requestCardList: [
          "مختصر خلاصہ اور مسئلہ کب شروع ہوا",
          "ڈیوائس ماڈل، iOS ورژن، اور ایپ ورژن",
          "مسئلہ دوبارہ پیدا کرنے کے مراحل",
          "اگر دستیاب ہوں تو اسکرین شاٹس یا error text",
          "خریداری مسائل میں غیر حساس آرڈر حوالہ تفصیلات اگر دستیاب ہوں"
        ],
        footerTitle: "Zikrim کی سرکاری سپورٹ صفحہ",
        footerBody: "یہ صفحہ صارف سپورٹ، App Store review، اور سرکاری رابطے کی ضرورتوں کے لیے عوامی طور پر شائع کیا گیا ہے۔",
        footerPrivacy: "پرائیویسی",
        footerTerms: "شرائط"
      }
    };

    const languageOrder = ["tr", "en", "de", "es", "fr", "id", "ms", "ar", "ur"];

    function setText(id, value) {
      const element = document.getElementById(id);
      if (element) element.textContent = value;
    }

    function renderList(id, items) {
      const element = document.getElementById(id);
      if (!element) return;
      element.innerHTML = "";
      items.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        element.appendChild(li);
      });
    }

    function populateSelector() {
      const select = document.getElementById("languageSelect");
      languageOrder.forEach((code) => {
        const option = document.createElement("option");
        option.value = code;
        option.textContent = translations[code].label;
        select.appendChild(option);
      });
      return select;
    }

    function resolveLanguage() {
      const params = new URLSearchParams(window.location.search);
      const explicit = params.get("lang");
      if (explicit && languageOrder.includes(explicit)) return explicit;
      const browser = (navigator.language || "en").slice(0, 2).toLowerCase();
      if (languageOrder.includes(browser)) return browser;
      return "en";
    }

    function applyLanguage(code) {
      const data = translations[code] || translations.en;
      document.documentElement.lang = code;
      setText("languageLabel", data.languageLabel);
      setText("heroPill1", data.heroPill1);
      setText("heroPill2", data.heroPill2);
      setText("heroPill3", data.heroPill3);
      setText("title", data.title);
      setText("intro", data.intro);
      setText("ctaPrimary", data.ctaPrimary);
      setText("ctaSecondary", data.ctaSecondary);
      setText("heroNotice", data.heroNotice);
      setText("metric1Title", data.metric1Title);
      setText("metric1Body", data.metric1Body);
      setText("metric2Title", data.metric2Title);
      setText("metric2Body", data.metric2Body);
      setText("metric3Title", data.metric3Title);
      setText("metric3Body", data.metric3Body);
      setText("supportScopeTitle", data.supportScopeTitle);
      setText("supportScopeIntro", data.supportScopeIntro);
      setText("scopeCard1Title", data.scopeCard1Title);
      setText("scopeCard2Title", data.scopeCard2Title);
      setText("helpTopicsTitle", data.helpTopicsTitle);
      setText("helpTopicsIntro", data.helpTopicsIntro);
      setText("topicCard1Title", data.topicCard1Title);
      setText("topicCard2Title", data.topicCard2Title);
      setText("requestGuideTitle", data.requestGuideTitle);
      setText("requestGuideIntro", data.requestGuideIntro);
      setText("requestCardTitle", data.requestCardTitle);
      setText("footerTitle", data.footerTitle);
      setText("footerBody", data.footerBody);
      setText("footerPrivacy", data.footerPrivacy);
      setText("footerTerms", data.footerTerms);
      renderList("scopeCard1List", data.scopeCard1List);
      renderList("scopeCard2List", data.scopeCard2List);
      renderList("topicCard1List", data.topicCard1List);
      renderList("topicCard2List", data.topicCard2List);
      renderList("requestCardList", data.requestCardList);
      document.getElementById("languageSelect").value = code;
      const url = new URL(window.location.href);
      url.searchParams.set("lang", code);
      window.history.replaceState({}, "", url);
    }

    const selector = populateSelector();
    applyLanguage(resolveLanguage());
    selector.addEventListener("change", (event) => applyLanguage(event.target.value));
  </script>
</body>
</html>
