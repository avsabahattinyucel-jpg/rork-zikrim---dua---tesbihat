    :root {
      color-scheme: light;
      --bg: #f3f6f5;
      --panel: rgba(255, 255, 255, 0.94);
      --text: #1f2937;
      --muted: #5f6b7b;
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.08);
      --border: rgba(15, 23, 42, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 24%),
        linear-gradient(180deg, #eef7f5 0%, var(--bg) 100%);
      color: var(--text);
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 44px 20px 88px;
    }
    .hero, section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.06);
    }
    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }
    section {
      padding: 24px;
      margin-top: 16px;
    }
    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    h1, h2 { margin: 0 0 12px; line-height: 1.2; }
    p, li {
      color: var(--muted);
      line-height: 1.72;
      margin: 0;
    }
    ul {
      padding-left: 20px;
      margin: 0;
      display: grid;
      gap: 10px;
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    .pill {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
    }
    label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }
    select {
      margin-left: 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }
    .notice {
      padding: 14px 16px;
      background: rgba(124, 45, 18, 0.08);
      border: 1px solid rgba(124, 45, 18, 0.14);
      border-radius: 16px;
      color: #8a4f1d;
      font-size: 14px;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
    @media (min-width: 760px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>

    const translationsAll = { ...translations, ...fallbackMap };
    const sectionMap = [
      ["section1Title", "section1List", "s1t", "s1"],
      ["section2Title", "section2List", "s2t", "s2"],
      ["section3Title", "section3List", "s3t", "s3"],
      ["section4Title", "section4List", "s4t", "s4"],
      ["section5Title", "section5List", "s5t", "s5"],
      ["section6Title", "section6List", "s6t", "s6"]
    ];

    const select = document.getElementById("languageSelect");
    Object.entries(translationsAll).forEach(([code, content]) => {
      const option = document.createElement("option");
      option.value = code;
      option.textContent = content.label;
      select.appendChild(option);
    });

    const initial = (translationsAll[(navigator.language || "en").slice(0, 2).toLowerCase()] ? (navigator.language || "en").slice(0, 2).toLowerCase() : "en");

    const render = (code) => {
      const content = translationsAll[code] || translationsAll.en;
      document.documentElement.lang = code;
      document.getElementById("title").textContent = content.title;
      document.getElementById("intro").textContent = content.intro;
      document.getElementById("updated").textContent = content.updated;
      document.getElementById("email").textContent = supportEmail;
      document.getElementById("languageLabel").textContent = content.languageLabel;
      document.getElementById("notice").textContent = content.notice;
      document.getElementById("footer").textContent = content.footer;

      sectionMap.forEach(([titleId, listId, titleKey, itemsKey]) => {
        document.getElementById(titleId).textContent = content[titleKey];
        const list = document.getElementById(listId);
        list.innerHTML = "";
        content[itemsKey].forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          list.appendChild(li);
        });
      });
    };

    select.value = initial;
    render(initial);
    select.addEventListener("change", (event) => render(event.target.value));
