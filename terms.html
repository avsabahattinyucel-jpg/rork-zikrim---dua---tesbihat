<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apple Standard EULA Redirect</title>
  <meta http-equiv="refresh" content="0; url=https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">
  <link rel="canonical" href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6f5;
      --panel: rgba(255, 255, 255, 0.95);
      --text: #1f2937;
      --muted: #5f6b7b;
      --accent: #0f766e;
      --border: rgba(15, 23, 42, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 24%),
        linear-gradient(180deg, #eef7f5 0%, var(--bg) 100%);
      color: var(--text);
    }
    main {
      max-width: 720px;
      padding: 28px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.06);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    a {
      display: inline-block;
      margin-top: 18px;
      color: #fff;
      background: var(--accent);
      border-radius: 999px;
      padding: 12px 18px;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Apple Standard EULA</h1>
    <p>This page now uses Apple&apos;s standard App Store end user license agreement.</p>
    <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">Open Apple Standard EULA</a>
  </main>
</body>
</html>
